<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub 恶意代码与安全扫描器</title>
    <style>
        /* 全局样式 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            line-height: 1.6;
            color: #333;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
        }

        /* 容器 */
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }

        /* 头部 */
        header {
            background: rgba(255, 255, 255, 0.95);
            padding: 30px;
            border-radius: 15px;
            margin-bottom: 30px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
            backdrop-filter: blur(10px);
        }

        h1 {
            font-size: 2.5rem;
            font-weight: 700;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 10px;
            text-align: center;
        }

        /* Markdown 内容区域 */
        .markdown-content {
            background: rgba(255, 255, 255, 0.95);
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
            backdrop-filter: blur(10px);
        }

        /* Markdown 样式 */
        .markdown-content h2 {
            color: #667eea;
            margin-top: 30px;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 2px solid #e0e0e0;
            font-size: 1.8rem;
        }

        .markdown-content h3 {
            color: #764ba2;
            margin-top: 25px;
            margin-bottom: 12px;
            font-size: 1.4rem;
        }

        .markdown-content p {
            margin-bottom: 15px;
            font-size: 1.1rem;
        }

        .markdown-content ul, .markdown-content ol {
            margin-bottom: 15px;
            margin-left: 25px;
            font-size: 1.1rem;
        }

        .markdown-content li {
            margin-bottom: 8px;
        }

        .markdown-content code {
            background: #f4f4f4;
            padding: 2px 6px;
            border-radius: 4px;
            font-family: 'Courier New', monospace;
            font-size: 0.95rem;
            color: #e83e8c;
        }

        .markdown-content pre {
            background: #2d2d2d;
            padding: 20px;
            border-radius: 8px;
            overflow-x: auto;
            margin-bottom: 15px;
        }

        .markdown-content pre code {
            background: transparent;
            color: #f8f8f2;
            padding: 0;
        }

        .markdown-content blockquote {
            border-left: 4px solid #667eea;
            padding-left: 20px;
            margin-left: 0;
            margin-bottom: 15px;
            font-style: italic;
            color: #666;
        }

        /* 链接样式 */
        .markdown-content a {
            color: #667eea;
            text-decoration: none;
            border-bottom: 1px solid transparent;
            transition: all 0.3s ease;
        }

        .markdown-content a:hover {
            color: #764ba2;
            border-bottom-color: #764ba2;
        }

        /* 按钮样式 */
        .btn {
            display: inline-block;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 12px 30px;
            border-radius: 50px;
            text-decoration: none;
            font-weight: 600;
            font-size: 1.1rem;
            margin: 10px 5px;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.3);
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.4);
        }

        /* 特性卡片 */
        .features {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-top: 30px;
        }

        .feature-card {
            background: linear-gradient(135deg, rgba(102, 126, 234, 0.1) 0%, rgba(118, 75, 162, 0.1) 100%);
            padding: 25px;
            border-radius: 12px;
            border: 1px solid rgba(102, 126, 234, 0.2);
            transition: all 0.3s ease;
        }

        .feature-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 25px rgba(102, 126, 234, 0.2);
        }

        /* 响应式设计 */
        @media (max-width: 768px) {
            h1 {
                font-size: 2rem;
            }

            .markdown-content {
                padding: 20px;
            }

            .markdown-content h2 {
                font-size: 1.5rem;
            }

            .markdown-content h3 {
                font-size: 1.2rem;
            }

            .features {
                grid-template-columns: 1fr;
            }
        }

        /* 加载动画 */
        .loading {
            text-align: center;
            padding: 50px;
            font-size: 1.2rem;
            color: #666;
        }

        .spinner {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* 页脚 */
        footer {
            text-align: center;
            margin-top: 30px;
            padding: 20px;
            color: rgba(255, 255, 255, 0.8);
            font-size: 0.9rem;
        }

        /* 回到顶部按钮 */
        .back-to-top {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.3);
            transition: all 0.3s ease;
            opacity: 0;
            visibility: hidden;
        }

        .back-to-top.visible {
            opacity: 1;
            visibility: visible;
        }

        .back-to-top:hover {
            transform: translateY(-5px);
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.4);
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>GitHub 恶意代码与安全扫描器</h1>
        </header>

        <div class="markdown-content" id="markdown-content">
            <div class="loading">
                <div class="spinner"></div>
                <p>正在加载文档...</p>
            </div>
        </div>

        <footer>
            <p>&copy; 2026 GitHub Malware & Security Scanner. All rights reserved.</p>
        </footer>
    </div>

    <div class="back-to-top" id="back-to-top">
        ↑
    </div>

    <!-- Marked.js 库 -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script>
        // 加载并显示 README.md
        async function loadReadme() {
            try {
                const response = await fetch('README.md');
                if (!response.ok) {
                    throw new Error('Failed to load README.md');
                }

                const content = await response.text();
                const html = marked.parse(content);
                document.getElementById('markdown-content').innerHTML = html;

                // 添加特性卡片样式
                addFeatureCardStyles();

                // 初始化回到顶部按钮
                initBackToTop();

            } catch (error) {
                console.error('Error loading README.md:', error);
                document.getElementById('markdown-content').innerHTML = `
                    <div style="text-align: center; padding: 50px; color: #e74c3c;">
                        <h2>❌ 加载文档失败</h2>
                        <p>无法加载 README.md 文件。请检查文件是否存在并重新加载页面。</p>
                    </div>
                `;
            }
        }

        // 添加特性卡片样式
        function addFeatureCardStyles() {
            // 查找所有 h2 元素，检查文本内容
            const allH2 = document.querySelectorAll('h2');
            allH2.forEach(h2 => {
                const text = h2.textContent || '';
                // 检查是否包含功能特性或 Features
                if (text.includes('功能特性') || text.includes('Features')) {
                    // 查找紧随其后的 ul 元素
                    let nextEl = h2.nextElementSibling;
                    while (nextEl && nextEl.tagName !== 'UL') {
                        nextEl = nextEl.nextElementSibling;
                    }

                    if (nextEl && nextEl.tagName === 'UL') {
                        const featuresDiv = document.createElement('div');
                        featuresDiv.className = 'features';

                        nextEl.querySelectorAll('li').forEach(li => {
                            const card = document.createElement('div');
                            card.className = 'feature-card';
                            card.innerHTML = li.innerHTML;
                            featuresDiv.appendChild(card);
                        });

                        nextEl.parentNode.replaceChild(featuresDiv, nextEl);
                    }
                }
            });
        }

        // 初始化回到顶部按钮
        function initBackToTop() {
            const backToTopBtn = document.getElementById('back-to-top');

            window.addEventListener('scroll', () => {
                if (window.pageYOffset > 300) {
                    backToTopBtn.classList.add('visible');
                } else {
                    backToTopBtn.classList.remove('visible');
                }
            });

            backToTopBtn.addEventListener('click', () => {
                window.scrollTo({
                    top: 0,
                    behavior: 'smooth'
                });
            });
        }

        // 页面加载完成后执行
        document.addEventListener('DOMContentLoaded', loadReadme);
    </script>
</body>
</html>
